<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#08090d">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signing you in — AgoraIQ</title>
<style>
:root {
  --bg: #0f1119;
  --text: #e8e8ea;
  --text2: #9999a0;
  --gold: #FCD535;
  --gold-dark: #EFBF04;
  --red: #ef4444;
  --green: #22c55e;
  --card: #181a24;
  --border: #252836;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  max-width: 440px;
  width: 100%;
  text-align: center;
}
.brand {
  font-family: "Syne", sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
}
.brand-iq { color: var(--gold); }
.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
h1 {
  font-size: 20px;
  font-weight: 600;
  margin: 0 0 8px;
}
p {
  color: var(--text2);
  font-size: 14px;
  line-height: 1.6;
  margin: 0 0 16px;
}
.err { color: var(--red); }
.ok { color: var(--green); }
.btn {
  display: inline-block;
  background: var(--gold);
  color: var(--bg);
  text-decoration: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  margin-top: 8px;
}
.btn:hover { background: var(--gold-dark); }
.hidden { display: none; }
</style>
<link rel="stylesheet" href="/assets/agoraiq-mobile.css">
</head>
<body>
<div class="card">
  <div class="brand">Agora<span class="brand-iq">IQ</span></div>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Signing you in…</h1>
    <p>One moment.</p>
  </div>
  <div id="error" class="hidden">
    <h1 class="err">Sign-in failed</h1>
    <p id="errorMsg">This link may have expired or already been used.</p>
    <a href="/login.html" class="btn">Request a new link</a>
  </div>
  <div id="success" class="hidden">
    <h1 class="ok">Signed in!</h1>
    <p>Redirecting to your dashboard…</p>
  </div>
</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var token = params.get("token");

  function showError(msg) {
    document.getElementById("loading").classList.add("hidden");
    var err = document.getElementById("error");
    err.classList.remove("hidden");
    if (msg) document.getElementById("errorMsg").textContent = msg;
  }

  function showSuccess() {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("success").classList.remove("hidden");
  }

  if (!token) {
    showError("No sign-in token in this link.");
    return;
  }

  fetch("/api/v1/auth/magic-link/verify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token: token })
  })
  .then(function(r){
    return r.json().then(function(body){ return { ok: r.ok, body: body }; });
  })
  .then(function(res){
    if (!res.ok) {
      showError(res.body.error || "Sign-in failed.");
      return;
    }
    try {
      localStorage.setItem("iq_token", res.body.token);
    } catch(e) {
      showError("Your browser blocked local storage. Please allow it for this site and try again.");
      return;
    }
    showSuccess();
    // Strip the token from the URL before redirect for hygiene
    try {
      var clean = new URL(window.location.href);
      clean.searchParams.delete("token");
      window.history.replaceState({}, "", clean.toString());
    } catch(e) {}
    setTimeout(function(){ window.location.href = "/dashboard.html"; }, 800);
  })
  .catch(function(err){
    showError("Network error. Please try again.");
  });
})();
</script>
<script src="/assets/agoraiq-mobile.js" defer></script>
</body>
</html>
